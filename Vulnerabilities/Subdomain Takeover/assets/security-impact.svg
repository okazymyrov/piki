<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 30 1300 1100'>
  <defs>
    <style>
      .label { font: bold 13px sans-serif; fill: #333; }
      .small-label { font: 11px sans-serif; fill: #555; }
      .tiny-label { font: 10px sans-serif; fill: #888; }
      .impact-title-red { font: bold 12px sans-serif; fill: #c62828; }
      .impact-title-purple { font: bold 12px sans-serif; fill: #7b1fa2; }
      .impact-title-orange { font: bold 12px sans-serif; fill: #e65100; }
      .impact-title-grey { font: bold 12px sans-serif; fill: #546e7a; }
      .legend-label { font: 11px sans-serif; fill: #555; }
    </style>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#c62828" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#A84300" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <!-- <rect width='1300' height='1200' fill='#ffffff'/> -->

  <!-- ═══════════════════════════════════════════════ -->
  <!-- OUTER GUIDE CIRCLE r=360                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx='650' cy='540' r='360' fill='none' stroke='#e0e0e0' stroke-width='1' stroke-dasharray='8,4'/>

  <!-- ═══════ SECTOR ARCS on r=360 ═══════════════ -->
  <!-- 13 items → 27.69° each. Boundaries at midpoints. -->

  <!-- Traffic Interception (343° → 97°, ~114° sweep, items 1–4) -->
  <path d='M 547 195 A 360 360 0 0 1 1008 581'
        fill='none' stroke='#c62828' stroke-width='32' stroke-opacity='0.22' stroke-linecap='round'/>

  <!-- Identity Compromise (97° → 216°, ~119° sweep, items 5–8) -->
  <path d='M 1008 581 A 360 360 0 0 1 438 831'
        fill='none' stroke='#7b1fa2' stroke-width='32' stroke-opacity='0.22' stroke-linecap='round'/>

  <!-- Cross-Environment Pivoting (216° → 288°, ~72° sweep, items 9–11) -->
  <path d='M 438 831 A 360 360 0 0 1 307 431'
        fill='none' stroke='#e65100' stroke-width='32' stroke-opacity='0.22' stroke-linecap='round'/>

  <!-- Business & Operational Impact (288° → 343°, ~55° sweep, items 12–13) -->
  <path d='M 307 431 A 360 360 0 0 1 547 195'
        fill='none' stroke='#546e7a' stroke-width='32' stroke-opacity='0.22' stroke-linecap='round'/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- MIDDLE RING: Exploitation Prerequisites (r=175) -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx='650' cy='540' r='175' fill='none' stroke='#e0e0e0' stroke-width='1' stroke-dasharray='6,4'/>
  <circle cx='650' cy='540' r='175' fill='none' stroke='#A84300' stroke-width='25' stroke-opacity='0.2'/>


  <!-- Mechanism: NS Name Collision (top, ~0°) -->
  <rect x='560' y='335' width='180' height='50' rx='8' fill='#FFF3E0' stroke='#A84300' stroke-width='2' filter='url(#glow-purple)'/>
  <text x='650' y='356' text-anchor='middle' class='label' fill='#A84300'>NS Name Collision</text>
  <text x='650' y='374' text-anchor='middle' class='tiny-label'>Same nameserver names assigned</text>

  <!-- Mechanism: Unverified Zone Creation (lower-right, ~120°) -->
  <rect x='690' y='645' width='220' height='50' rx='8' fill='#FFF3E0' stroke='#A84300' stroke-width='2' filter='url(#glow-purple)'/>
  <text x='800' y='666' text-anchor='middle' class='label' fill='#A84300'>Unverified Zone Creation</text>
  <text x='800' y='682' text-anchor='middle' class='tiny-label'>Provider allows self-service zone registration</text>

  <!-- Mechanism: Control Plane Capability Abuse (lower-left, ~240°) -->
  <rect x='385' y='645' width='230' height='50' rx='8' fill='#FFF3E0' stroke='#A84300' stroke-width='2' filter='url(#glow-purple)'/>
  <text x='500' y='666' text-anchor='middle' class='label' fill='#A84300'>Control Plane Capability Abuse</text>
  <text x='500' y='682' text-anchor='middle' class='tiny-label'>Provider APIs allow bypass UI restrictions</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CENTER: Vulnerability                           -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx='650' cy='540' r='70' fill='#ffebee' stroke='#c62828' stroke-width='3' filter='url(#glow-red)'/>
  <circle cx='650' cy='540' r='52' fill='#fff' stroke='#ef9a9a' stroke-width='1.5'/>
  <text x='650' y='528' text-anchor='middle' font-size='12' font-weight='bold' fill='#c62828'>NS Dangling</text>
  <text x='650' y='544' text-anchor='middle' font-size='12' font-weight='bold' fill='#c62828'>Vulnerability</text>
  <text x='650' y='558' text-anchor='middle' font-size='9' fill='#c62828'>Deleted zone +</text>
  <text x='650' y='570' text-anchor='middle' font-size='9' fill='#c62828'>orphan NS records</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- OUTER RING: 13 impact items at ~27.7° intervals, r=460    -->
  <!-- Center (650,540). Uniform box 200×55.                      -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- ── TRAFFIC INTERCEPTION (items 1–4, red) ────────────── -->

  <!-- 1. Web Traffic Redirection (0°) — bottom edge touches outer arc -->
  <rect x='550' y='109' width='200' height='55' rx='10' fill='#fff' stroke='#c62828' stroke-width='2' filter='url(#sh)'/>
  <text x='650' y='129' text-anchor='middle' class='impact-title-red'>🔀 Web Traffic Redirection</text>
  <text x='650' y='144' text-anchor='middle' class='small-label'>HTTP/HTTPS traffic hijacked</text>
  <text x='650' y='157' text-anchor='middle' class='tiny-label'>Users sent to attacker's servers</text>

  <!-- 2. TLS Certificate Issuance (35.2°) — nearest edge touches outer arc -->
  <rect x='809' y='144' width='200' height='55' rx='10' fill='#fff' stroke='#c62828' stroke-width='2' filter='url(#sh)'/>
  <text x='909' y='164' text-anchor='middle' class='impact-title-red'>🔓 TLS Certificate Issuance</text>
  <text x='909' y='179' text-anchor='middle' class='small-label'>DNS-01 challenge exploited</text>
  <text x='909' y='192' text-anchor='middle' class='tiny-label'>Valid cert for victim's subdomain</text>

  <!-- 3. Email Interception (65.7°) — nearest edge touches outer arc -->
  <rect x='986' y='316' width='200' height='55' rx='10' fill='#fff' stroke='#c62828' stroke-width='2' filter='url(#sh)'/>
  <text x='1086' y='336' text-anchor='middle' class='impact-title-red'>✉️ Email Interception</text>
  <text x='1086' y='351' text-anchor='middle' class='small-label'>MX records under attacker control</text>
  <text x='1086' y='364' text-anchor='middle' class='tiny-label'>Notifications, credential resets captured</text>

  <!-- 4. Internal Service Interception (87.4°) — left edge touches outer arc -->
  <rect x='1026' y='491' width='210' height='55' rx='10' fill='#fff' stroke='#c62828' stroke-width='2' filter='url(#sh)'/>
  <text x='1131' y='511' text-anchor='middle' class='impact-title-red'>🔌 Internal Service Interception</text>
  <text x='1131' y='526' text-anchor='middle' class='small-label'>Backend communication intercepted</text>
  <text x='1131' y='539' text-anchor='middle' class='tiny-label'>Microservice architectures at risk</text>

  <!-- ── IDENTITY COMPROMISE (items 5–8, purple) ─────────── -->

  <!-- 5. Phishing & Credential Harvesting (105.7°) — nearest edge touches outer arc -->
  <rect x='1012' y='642' width='230' height='55' rx='10' fill='#fff' stroke='#7b1fa2' stroke-width='2' filter='url(#sh)'/>
  <text x='1122' y='662' text-anchor='middle' class='impact-title-purple'>🎣 Phishing &amp; Credential Harvesting</text>
  <text x='1122' y='677' text-anchor='middle' class='small-label'>Legitimate-looking login pages</text>
  <text x='1122' y='690' text-anchor='middle' class='tiny-label'>Bypass filters &amp; user suspicion</text>

  <!-- 6. Auth System Compromise (130.0°) — nearest edge touches outer arc -->
  <rect x='908' y='813' width='240' height='55' rx='10' fill='#fff' stroke='#7b1fa2' stroke-width='2' filter='url(#sh)'/>
  <text x='1028' y='833' text-anchor='middle' class='impact-title-purple'>🔑 Authentication System Compromise</text>
  <text x='1028' y='848' text-anchor='middle' class='small-label'>SSO/OAuth endpoints hijacked</text>
  <text x='1028' y='861' text-anchor='middle' class='tiny-label'>Account takeover, privilege escalation</text>

  <!-- 7. Session & Cookie Attacks (161.8°) — top edge touches outer arc -->
  <rect x='682' y='915' width='200' height='55' rx='10' fill='#fff' stroke='#7b1fa2' stroke-width='2' filter='url(#sh)'/>
  <text x='782' y='935' text-anchor='middle' class='impact-title-purple'>🍪 Session &amp; Cookie Attacks</text>
  <text x='782' y='950' text-anchor='middle' class='small-label'>Cross-subdomain cookie injection</text>
  <text x='782' y='963' text-anchor='middle' class='tiny-label'>Authentication bypass, session hijack</text>

  <!-- 8. Identity Provisioning Misconfiguration (199.0°) — top edge touches outer arc -->
  <rect x='372' y='914' width='240' height='55' rx='10' fill='#fff' stroke='#7b1fa2' stroke-width='2' filter='url(#sh)'/>
  <text x='492' y='934' text-anchor='middle' class='impact-title-purple'>🪨 Identity Provision Misconfiguation</text>
  <text x='492' y='949' text-anchor='middle' class='small-label'>Improper email domain validation</text>
  <text x='492' y='962' text-anchor='middle' class='tiny-label'>Unauthorized account creation</text>

  <!-- ── CROSS-ENVIRONMENT PIVOTING (items 9–11, orange) ──── -->

  <!-- 9. DNS / Wildcard Control (232.9°) — nearest edge touches outer arc -->
  <rect x='175' y='796' width='200' height='55' rx='10' fill='#fff' stroke='#e65100' stroke-width='2' filter='url(#sh)'/>
  <text x='275' y='816' text-anchor='middle' class='impact-title-orange'>🌐 DNS Namespace Control</text>
  <text x='275' y='831' text-anchor='middle' class='small-label'>Arbitrary records in namespace</text>
  <text x='275' y='844' text-anchor='middle' class='tiny-label'>Facilitates cross-environment pivoting</text>

  <!-- 10. Staging/Dev Compromise (258.6°) — right edge touches outer arc -->
  <rect x='80' y='607' width='200' height='55' rx='10' fill='#fff' stroke='#e65100' stroke-width='2' filter='url(#sh)'/>
  <text x='180' y='627' text-anchor='middle' class='impact-title-orange'>🏗️ Staging/Dev Compromise</text>
  <text x='180' y='642' text-anchor='middle' class='small-label'>Pre-production access gained</text>
  <text x='180' y='655' text-anchor='middle' class='tiny-label'>Lateral movement to production</text>

  <!-- 11. CI/CD Compromise (277.2°) — right edge touches outer arc -->
  <rect x='75' y='453' width='200' height='55' rx='10' fill='#fff' stroke='#e65100' stroke-width='2' filter='url(#sh)'/>
  <text x='175' y='473' text-anchor='middle' class='impact-title-orange'>⚙️ CI/CD Compromise</text>
  <text x='175' y='488' text-anchor='middle' class='small-label'>Supply chain poisoning</text>
  <text x='175' y='501' text-anchor='middle' class='tiny-label'>Backdoored builds &amp; packages</text>

  <!-- ── BUSINESS & OPERATIONAL IMPACT (items 12–13, grey) ── -->

  <!-- 12. Service Disruption (298.2°) — nearest edge touches outer arc -->
  <rect x='104' y='281' width='230' height='55' rx='10' fill='#fff' stroke='#546e7a' stroke-width='2' filter='url(#sh)'/>
  <text x='219' y='301' text-anchor='middle' class='impact-title-grey'>🛑 Service Disruption</text>
  <text x='219' y='316' text-anchor='middle' class='small-label'>Service instability, cascading failures</text>
  <text x='219' y='329' text-anchor='middle' class='tiny-label'>Operational downtime, degraded availability</text>

  <!-- 13. Reputational & Compliance Impact (326.7°) — nearest edge touches outer arc -->
  <rect x='286' y='134' width='230' height='55' rx='10' fill='#fff' stroke='#546e7a' stroke-width='2' filter='url(#sh)'/>
  <text x='401' y='154' text-anchor='middle' class='impact-title-grey'>📉 Reputational &amp; Compliance</text>
  <text x='401' y='169' text-anchor='middle' class='small-label'>Compliance violations, regulatory exposure</text>
  <text x='401' y='182' text-anchor='middle' class='tiny-label'>Brand damage, loss of customer trust</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEGEND                                          -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x='300' y='1040' width='700' height='68' rx='10' fill='#fff' stroke='#e0e0e0' stroke-width='1' filter='url(#sh)'/>

  <!-- LEFT: Core Vulnerability + Exploitation Prerequisites -->
  <circle cx='335' cy='1060' r='9' fill='#ffebee' stroke='#c62828' stroke-width='2'/>
  <text x='335' y='1064' text-anchor='middle' font-size='9' font-weight='bold' fill='#c62828'>!</text>
  <text x='354' y='1064' class='legend-label'>Core Vulnerability</text>

  <rect x='326' y='1076' width='140' height='18' rx='4' fill='#FFF3E0' stroke='#A84300' stroke-width='1.5'/>
  <text x='336' y='1089' class='legend-label'>Exploitation Prerequisites</text>

  <!-- Vertical separator -->
  <line x1='508' y1='1048' x2='508' y2='1100' stroke='#ccc' stroke-width='1'/>

  <!-- RIGHT: 2×2 category badges (solid border + inner dashed line like arcs) -->
  <!-- Traffic Interception -->
  <line x1='534' y1='1060' x2='697' y2='1060' stroke='#e0e0e0' stroke-width='1' stroke-dasharray='8,4'/>
  <rect x='528' y='1050' width='175' height='20' rx='10' fill='#c62828' fill-opacity='0.22'/>
  <text x='616' y='1064' text-anchor='middle' class='legend-label'>TRAFFIC INTERCEPTION</text>

  <!-- Cross-Environment Pivoting -->
  <line x1='724' y1='1060' x2='944' y2='1060' stroke='#e0e0e0' stroke-width='1' stroke-dasharray='8,4'/>
  <rect x='718' y='1050' width='232' height='20' rx='10' fill='#e65100' fill-opacity='0.22'/>
  <text x='834' y='1064' text-anchor='middle' class='legend-label'>CROSS-ENVIRONMENT PIVOTING</text>

  <!-- Identity Compromise -->
  <line x1='534' y1='1088' x2='697' y2='1088' stroke='#e0e0e0' stroke-width='1' stroke-dasharray='8,4'/>
  <rect x='528' y='1078' width='175' height='20' rx='10' fill='#7b1fa2' fill-opacity='0.22'/>
  <text x='616' y='1092' text-anchor='middle' class='legend-label'>IDENTITY COMPROMISE</text>

  <!-- Business & Operational Impact -->
  <line x1='724' y1='1088' x2='972' y2='1088' stroke='#e0e0e0' stroke-width='1' stroke-dasharray='8,4'/>
  <rect x='718' y='1078' width='260' height='20' rx='10' fill='#546e7a' fill-opacity='0.22'/>
  <text x='848' y='1092' text-anchor='middle' class='legend-label'>BUSINESS &amp; OPERATIONAL IMPACT</text>

</svg>
