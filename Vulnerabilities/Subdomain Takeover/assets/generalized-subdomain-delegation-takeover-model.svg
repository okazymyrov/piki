<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 720'>
  <defs>
    <!-- Storebrand palette: Purple #610080, Red #B20000, Dark Maroon #560000 -->
    <filter id='glow-purple' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='0' stdDeviation='6' flood-color='#61008030'/>
    </filter>
    <filter id='glow-red' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='0' stdDeviation='6' flood-color='#B2000030'/>
    </filter>
    <filter id='glow-maroon' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='0' stdDeviation='6' flood-color='#56000030'/>
    </filter>
    <marker id='arr-red' markerWidth='10' markerHeight='8' refX='9' refY='4' orient='auto'>
      <polygon points='0 0, 10 4, 0 8' fill='#B20000'/>
    </marker>
    <marker id='arr-maroon' markerWidth='10' markerHeight='8' refX='9' refY='4' orient='auto'>
      <polygon points='0 0, 10 4, 0 8' fill='#560000'/>
    </marker>
  </defs>

  <!-- White Background -->
  <!-- <rect width='1000' height='720' fill='#FFFFFF'/> -->

  <!-- ===== CENTER CIRCLE ===== -->
  <circle cx='500' cy='340' r='95' fill='#FFF0F0' stroke='#B20000' stroke-width='2' opacity='0.6'/>

  <!-- Center text -->
  <text x='500' y='330' text-anchor='middle' font-size='15' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#560000'>SUBDOMAIN TAKEOVER</text>
  <text x='500' y='350' text-anchor='middle' font-size='15' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#560000'>FLOW</text>
  <text x='500' y='372' text-anchor='middle' font-size='11' font-family='Storebrand Text, sans-serif' fill='#770000' letter-spacing='3'>Query · Claim · Pwn</text>

  <!-- ===== PHASE 1: RECONNAISSANCE (Purple, LEFT BOTTOM) ===== -->
  <g filter='url(#glow-purple)'>
    <rect x='30' y='585' width='220' height='72' rx='10' fill='#FFFFFF' stroke='#610080' stroke-width='2'/>
  </g>
  <circle cx='55' cy='605' r='12' fill='#610080'/>
  <text x='55' y='610' text-anchor='middle' font-size='12' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#FFFFFF'>1</text>
  <text x='75' y='610' font-size='13' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#610080'>RECONNAISSANCE</text>
  <text x='50' y='630' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Identify targets with</text>
  <text x='50' y='644' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>dangling NS delegations</text>

  <!-- ===== PHASE 2: CREATE ZONE (Red, ~8 o'clock) ===== -->
  <g filter='url(#glow-red)'>
    <rect x='280' y='470' width='210' height='72' rx='10' fill='#FFFFFF' stroke='#B20000' stroke-width='2'/>
  </g>
  <circle cx='305' cy='490' r='12' fill='#B20000'/>
  <text x='305' y='495' text-anchor='middle' font-size='12' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#FFFFFF'>2</text>
  <text x='325' y='495' font-size='13' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#B20000'>CREATE ZONE</text>
  <text x='300' y='515' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Register hosted zone at</text>
  <text x='300' y='529' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>DNS provider</text>

  <!-- ===== PHASE 3: CHECK NS (Red, ~4 o'clock) ===== -->
  <g filter='url(#glow-red)'>
    <rect x='700' y='310' width='220' height='72' rx='10' fill='#FFFFFF' stroke='#B20000' stroke-width='2'/>
  </g>
  <circle cx='725' cy='330' r='12' fill='#B20000'/>
  <text x='725' y='335' text-anchor='middle' font-size='12' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#FFFFFF'>3</text>
  <text x='745' y='335' font-size='13' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#B20000'>CHECK NS RECORDS</text>
  <text x='720' y='355' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Do assigned NS match the</text>
  <text x='720' y='369' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>dangling NS delegation?</text>

  <!-- ===== PHASE 4: DELETE & RETRY (Red, ~12 o'clock) ===== -->
  <g filter='url(#glow-red)'>
    <rect x='400' y='105' width='210' height='72' rx='10' fill='#FFFFFF' stroke='#B20000' stroke-width='2'/>
  </g>
  <circle cx='425' cy='125' r='12' fill='#B20000'/>
  <text x='425' y='130' text-anchor='middle' font-size='12' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#FFFFFF'>4</text>
  <text x='445' y='130' font-size='13' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#B20000'>DELETE &amp; RETRY</text>
  <text x='420' y='150' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>NS mismatch - delete zone</text>
  <text x='420' y='164' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>and try again</text>

  <!-- ===== PHASE 5: ZONE TAKEOVER (Dark Maroon, RIGHT BOTTOM) ===== -->
  <g filter='url(#glow-maroon)'>
    <rect x='700' y='490' width='220' height='72' rx='10' fill='#FFFFFF' stroke='#560000' stroke-width='2'/>
  </g>
  <circle cx='725' cy='510' r='12' fill='#560000'/>
  <text x='725' y='515' text-anchor='middle' font-size='12' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#FFFFFF'>5</text>
  <text x='745' y='515' font-size='13' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#560000'>ZONE TAKEOVER</text>
  <text x='720' y='535' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>NS match! Full DNS control.</text>
  <text x='720' y='549' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>A, MX, TXT records created.</text>

  <!-- ===== FLOW ARROWS ===== -->

  <!-- Arrow 1→2: Reconnaissance → Create Zone -->
  <path d='M 250 615 Q 270 570 280 506'
        stroke='#B20000' stroke-width='2' fill='none' marker-end='url(#arr-red)' stroke-linecap='round'/>

  <!-- Arrow 2→3: Create Zone → Check NS -->
  <path d='M 490 500 Q 600 450 698 346'
        stroke='#B20000' stroke-width='2' fill='none' marker-end='url(#arr-red)' stroke-linecap='round'/>

  <!-- Arrow 3→4 (No): Check NS → Delete & Retry -->
  <path d='M 730 310 Q 680 230 612 141'
        stroke='#B20000' stroke-width='2' fill='none' marker-end='url(#arr-red)' stroke-linecap='round'/>
  <!-- "No" label -->
  <rect x='658' y='248' width='40' height='20' rx='8' fill='#B20000' opacity='0.10'/>
  <text x='678' y='262' text-anchor='middle' font-size='10' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#B20000'>NO</text>

  <!-- Arrow 3→5 (Yes): Check NS → Zone Takeover -->
  <path d='M 830 382 L 830 488'
        stroke='#560000' stroke-width='2' fill='none' marker-end='url(#arr-maroon)' stroke-linecap='round'/>
  <!-- "Yes" label -->
  <rect x='840' y='422' width='40' height='20' rx='8' fill='#560000' opacity='0.10'/>
  <text x='860' y='436' text-anchor='middle' font-size='10' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#560000'>YES</text>

  <!-- Arrow 4→2 (Retry loop): Delete & Retry → Create Zone -->
  <path d='M 400 141 Q 310 220 300 350 Q 295 420 300 468'
        stroke='#B20000' stroke-width='1.5' fill='none' marker-end='url(#arr-red)' stroke-linecap='round'/>
  <!-- "Retry" label -->
  <rect x='258' y='316' width='48' height='20' rx='8' fill='#B20000' opacity='0.10'/>
  <text x='282' y='330' text-anchor='middle' font-size='10' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#B20000'>RETRY</text>

  <!-- ===== PHASE 6: ACTIONS ON OBJECTIVES (Dark Maroon, below box 5) ===== -->
  <g filter='url(#glow-maroon)'>
    <rect x='700' y='585' width='220' height='72' rx='10' fill='#FFFFFF' stroke='#560000' stroke-width='2'/>
  </g>
  <circle cx='725' cy='605' r='12' fill='#560000'/>
  <text x='725' y='610' text-anchor='middle' font-size='12' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#FFFFFF'>6</text>
  <text x='745' y='610' font-size='13' font-weight='bold' font-family='Storebrand Text, sans-serif' fill='#560000'>ACTIONS ON OBJECTIVES</text>
  <text x='720' y='630' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Traffic Interception, Identity</text>
  <text x='720' y='644' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Compromise, Cross-Environment Pivoting</text>

  <!-- Arrow from Zone Takeover → Actions on Objectives -->
  <path d='M 810 562 L 810 583'
        stroke='#560000' stroke-width='1.5' fill='none' marker-end='url(#arr-maroon)' stroke-linecap='round'/>

  <!-- ===== BOTTOM LEGEND ===== -->
  <g transform='translate(270, 690)'>
    <circle cx='0' cy='0' r='5' fill='#610080'/>
    <text x='12' y='4' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Reconnaissance</text>
    <circle cx='140' cy='0' r='5' fill='#B20000'/>
    <text x='152' y='4' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Subdomain Takeover</text>
    <circle cx='320' cy='0' r='5' fill='#560000'/>
    <text x='332' y='4' font-size='10' font-family='Storebrand Text, sans-serif' fill='#770000'>Impact</text>
  </g>
</svg>
